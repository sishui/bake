#go install github.com/sishui/bake/cmd/bake@latest
#bake init

log:
  file: ""

uncountables: [ "sms", "mms", "rls" ]

initialisms: [ "ID", "UID", "URL", "URI", "UUID", "IP" ]

timezone: ""

template:
  dir: ""
output:
  dir: "model"
  package: "model"
  module: "github.com/username/project"
db:
  - driver: "postgres"
    dsn: "postgres://postgres:123456@127.0.0.1:5432/postgres?sslmode=disable"
    schema: "public"
    include: [ ]
    exclude: [ ]
    custom:
      test_all_types:
        tags:
          - key: "form"
            name: "$SnakeCase"
          - key: "xml"
            name: "$CamelCase"
      users:
        tags:
          - key: "form"
            name: "$SnakeCase"
        fields:
          posts:
            type: "[]*Post"
            comment: "custom comment"
            relation: true
            tags:
              - key: "bun"
                options: [ "rel:has-many", "join:id=user_id" ]
      posts:
        tags:
          - key: "xml"
            name: "$SnakeCase"
        fields:
          user:
            type: "*User"
            comment: "custom comment"
            relation: true
            tags:
              - key: "bun"
                options: [ "rel:belongs-to", "join:user_id=id" ]
      mail:
        tags:
          - key: "form"
        fields:
          has_attachment:
            name: "CustomHasAttachment"
            tags:
              - key: "json"
                name: "#has_attachment"
          attachments:
            type: "[]*MailAttachment"
            comment: "email attachments"
            relation: true
            tags:
              - key: "bun"
                options: [ "rel:has-many", "join:id=mail_id" ]

custom:
  - name: "Config"
    comment: "Application configuration stored as JSONB"
    fields:
      - name: "Theme"
        type: "string"
        comment: "UI theme (light/dark)"
      - name: "Locale"
        type: "string"
        comment: "User locale"
      - name: "Description"
        type: "string"
        comment: "A detailed description\nof the configuration\nwith multiple lines"
      - name: "Notifications"
        type: "bool"
        comment: "Enable push notifications"
      - name: "RefreshInterval"
        type: "int"
        comment: "Auto-refresh interval in seconds"

  - name: "Metadata"
    comment: "Resource metadata stored as JSON column"
    fields:
      - name: "Tags"
        type: "[]string"
        comment: "Resource tags"
      - name: "Version"
        type: "int64"
        comment: "Resource version number"
      - name: "Owner"
        type: "string"
        comment: "Resource owner UID"
      - name: "Visibility"
        type: "string"
        tags:
          - key: "json"
            name: "visibility"
            options: [ "omitempty" ]

  - name: "Address"
    comment: "Address value object stored as JSONB"
    fields:
      - name: "Country"
        type: "string"
        comment: "Country code (ISO 3166-1 alpha-2)"
      - name: "City"
        type: "string"
      - name: "Coordinates"
        type: "[]float64"
        comment: "GPS coordinates\n(latitude, longitude)"
      - name: "Street"
        type: "string"
      - name: "ZipCode"
        type: "string"
        comment: "Postal code"
